config:
  # Prose line length; long tables, code blocks, and headings are exempt.
  MD013:
    line_length: 100
    code_blocks: false
    tables: false
    headings: false
  # Generated docs and ADRs may open with a badge line or front matter before
  # the H1 — don't force the first line to be a top-level heading.
  MD041: false
