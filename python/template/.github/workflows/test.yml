name: Test

# The python overlay's CI — owned by the overlay, disjoint from the base's
# lint.yml (ADR-0020 in the template's source repo). Runs the overlay's lang-
# tagged lefthook slice (ruff) plus typecheck and tests, all through uv so the
# tool versions come from uv.lock; lefthook itself comes from PyPI via uvx, so
# this job needs no Homebrew. Protected branch hardcoded to main (the base
# default; a repo on another branch edits the line below).
on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    # Draft PRs open early and take WIP pushes; a skipped-via-if job reads as
    # passing to required-status-check branch protection, not failing, so this
    # stays quiet until ready_for_review re-triggers it.
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --locked
      # The same lefthook registry contributors run locally, scoped to the
      # overlay's jobs via their tag — the base workflow runs the base slice.
      - name: Run language lint (lefthook lang slice)
        run: uvx lefthook run pre-commit --all-files --tag lang
      - run: uv run pyright
      - run: uv run pytest
