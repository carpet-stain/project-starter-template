name: Feature / enhancement
description: Propose a new feature or an improvement.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: The problem or need — lead with the point, not the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What you'd build or change, and the alternatives you weighed.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance
      description: How we'll know it's done.
    validations:
      required: false
